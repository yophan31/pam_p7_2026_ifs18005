name: pam_p7_2026_ifs18005
description: "Delcom Plants dengan Flutter Networking."
publish_to: 'none'
version: 2.0.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.4.0

  # File Picker untuk upload gambar
  image_picker: ^1.1.2

  # State Management
  provider: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  launcher_name: ^1.0.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"

launcher_name:
  default: "Delcom Plants Flutter"
  id: "Delcom Tumbuhan Flutter"

flutter:
  uses-material-design: true
  assets:
    - assets/images/